<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job-Tracker</title>
   <link rel="stylesheet" href="./style.css">
    <!-- Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

  <h1 class="title">Job Application Tracker</h1>

   <!-- Dashboard  -->
  <div class="dashboard">
    <div class="dash-card">
      <p>Total</p>
      <h2 id="totalCount">8</h2>
    </div>
    <div class="dash-card">
      <p>Interview</p>
      <h2 id="interviewCount" class="green">0</h2>
    </div>
    <div class="dash-card">
      <p>Rejected</p>
      <h2 id="rejectedCount" class="red">0</h2>
    </div>
  </div>


    <!-- Available Jobs Section -->
  <div class="section">

    <div class="section-header">
      <h2>Available Jobs</h2>
      <span id="tabJobCount">8 Jobs</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="interview">Interview</button>
      <button class="tab" data-tab="rejected">Rejected</button>
    </div>

    <div id="jobsContainer" class="jobs-grid"></div>

        <!-- Empty UI -->
    <div id="emptyState" class="empty">
      <img src="./images.png" alt="Empty">
      <h3>No jobs available</h3>
      <p>Check back later or change tab</p>
    </div>

  </div>

</div>

<script src="./script.js"></script>
    
</body>
</html>
